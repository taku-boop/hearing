<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>高速ヒアリング読取 | Cross Effect</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --accent:#e8441a;--dark:#111;--blue:#2563eb;--gray:#9ca3af;
  --bg:#f2f2f7;--card:#fff;--border:#d1d5db;--text:#111;--sub:#6b7280;
}
body{font-family:-apple-system,'Hiragino Sans','Yu Gothic',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:40px;}

.hdr{background:var(--dark);color:#fff;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.3);}
.hdr .brand{font-size:10px;color:#888;letter-spacing:.1em;}
.hdr h1{font-size:16px;font-weight:700;}

.main{padding:16px;max-width:500px;margin:0 auto;}
.card{background:var(--card);border-radius:14px;padding:18px;margin-bottom:14px;box-shadow:0 1px 4px rgba(0,0,0,.08);}
.card-lbl{font-size:11px;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:.07em;margin-bottom:14px;}

.upload-zone{border:2px dashed #ccc;border-radius:10px;padding:42px 20px;text-align:center;background:#fafafa;position:relative;cursor:pointer;transition:all .2s;}
.upload-zone:active{border-color:var(--accent);background:#fff5f3;}
.upload-zone input{position:absolute;inset:0;opacity:0;width:100%;height:100%;cursor:pointer;}
.upload-icon{font-size:44px;display:block;margin-bottom:10px;}
.upload-main{font-size:16px;font-weight:700;color:var(--dark);margin-bottom:4px;}
.upload-sub{font-size:13px;color:var(--sub);line-height:1.6;}

.preview-wrap{display:none;position:relative;}
.preview-wrap img{width:100%;border-radius:10px;display:block;}

.btn{display:block;width:100%;padding:17px;border:none;border-radius:12px;font-size:16px;font-weight:700;cursor:pointer;text-align:center;font-family:inherit;-webkit-appearance:none;letter-spacing:.02em;}
.btn:active{filter:brightness(.9);}
.btn:disabled{opacity:.4;pointer-events:none;}
.btn-accent{background:var(--accent);color:#fff;}

/* タスクマネージャー（バックグラウンド通知用） */
.task-container{margin-bottom:14px;}
.task-item{background:#fff;border-left:4px solid var(--blue);padding:10px 14px;border-radius:0 8px 8px 0;margin-bottom:6px;font-size:13px;box-shadow:0 1px 3px rgba(0,0,0,.05);display:flex;justify-content:space-between;align-items:center;}
.task-item.success{border-left-color:#16a34a;background:#f0fdf4;}
.task-item.error{border-left-color:#dc2626;background:#fef2f2;}
</style>
</head>
<body>

<div class="hdr">
  <div><div class="brand">CROSS EFFECT</div><h1>ヒアリング高速登録</h1></div>
  <button onclick="openCfg()" style="background:none;border:1px solid #555;color:#ccc;padding:6px 12px;border-radius:6px;font-size:13px;cursor:pointer;">⚙ 設定</button>
</div>

<div class="main">

  <!-- 裏で処理中のステータスを表示するエリア -->
  <div class="task-container" id="taskContainer"></div>

  <div class="card">
    <div class="card-lbl">📷 シートを撮影して即送信（待ち時間なし）</div>
    <div class="upload-zone" id="uploadZone">
      <input type="file" accept="image/*" id="fileInput" onchange="onFile(this)">
      <span class="upload-icon">📸</span>
      <div class="upload-main">タップして撮影</div>
      <div class="upload-sub">撮影して「送信」を押せば、裏で自動解析します。<br>画面の前で待つ必要はなく、すぐ次の撮影に移れます。</div>
    </div>
    <div class="preview-wrap" id="previewWrap">
      <img id="previewImg" src="" alt="">
    </div>
  </div>

  <button class="btn btn-accent" id="sendBtn" onclick="queueUpload()" disabled>🚀 裏で自動解析してスプレッドシートへ送る</button>
</div>

<script>
// ═══════════════════════════════════════════════════
//  固定設定
// ═══════════════════════════════════════════════════
const GAS_URL      = 'https://script.google.com/macros/s/AKfycbxhH9mh8x6c_8Ql33QAZ83F2yb4cZRmcnLsGj5HaFJ6PjsAgbQMRyAomcToH0RqGO30/exec';
const GEMINI_MODEL = 'gemini-1.5-flash'; 
const GEMINI_API   = 'https://generativelanguage.googleapis.com/v1/models'; 

function getKey() { return localStorage.getItem('xef_gemini') || ''; }
// ═══════════════════════════════════════════════════

let imgB64 = null, imgMime = 'image/jpeg';
let jobCounter = 0;

function onFile(input) {
  const file = input.files[0];
  if (!file) return;
  
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      const MAX = 1000; // バックグラウンド処理を軽くするため少し軽量化
      let w = img.width, h = img.height;
      if (w > MAX) { h = Math.round(h * MAX / w); w = MAX; }
      if (h > MAX) { w = Math.round(w * MAX / h); h = MAX; }
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      
      imgB64 = canvas.toDataURL('image/jpeg', 0.75).split(',')[1];
      document.getElementById('previewImg').src = canvas.toDataURL('image/jpeg', 0.75);
      document.getElementById('uploadZone').style.display  = 'none';
      document.getElementById('previewWrap').style.display = 'block';
      document.getElementById('sendBtn').disabled = false;
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

// ボタンを押したら即座にバックグラウンドタスクに投入し、画面をリセットする
function queueUpload() {
  const GEMINI_KEY = getKey();
  if (!GEMINI_KEY) {
    alert('APIキーが未設定です。右上の⚙設定からキーを入力してください。');
    return;
  }

  jobCounter++;
  const jobId = 'job_' + Date.now();
  const currentB64 = imgB64;
  
  // タスクマネージャーに「解析中」として追加
  const container = document.getElementById('taskContainer');
  const taskHtml = `
    <div class="task-item" id="${jobId}">
      <span>📄 ${jobCounter}枚目のシート: ⚙️ 裏側でAIが自動解析中...</span>
    </div>`;
  container.insertAdjacentHTML('afterbegin', taskHtml);

  // 画面は1秒も待たせずに即リセット（すぐ次の写真を撮れる状態にする）
  imgB64 = null;
  document.getElementById('fileInput').value = '';
  document.getElementById('uploadZone').style.display  = 'block';
  document.getElementById('previewWrap').style.display = 'none';
  document.getElementById('sendBtn').disabled = true;

  // 非同期（バックグラウンド）でAI読み取りとGAS送信を実行
  processBackgroundJob(jobId, jobCounter, currentB64, GEMINI_KEY);
}

// 裏側でひっそり走る処理（画面の操作を邪魔しません）
async function processBackgroundJob(jobId, num, b64Data, apiKey) {
  const prompt = `これはクロスエフェクト株式会社の展示会ヒアリングシートの写真です。
必ず指定のJSON形式のみで返答してください。
{"card_company":"","card_department":"","card_name":"","card_phone":"","card_email":"","date":"","staff":"","exhibition":"","q1":"","q1_other":"","q2":"","q2_other":"","q3":"","q3_other":"","q4":"","q4_other":"","q5":"","q5_other":"","q6":"","q6_other":"","q7":"","q7_other":"","q8":"","q8_visit_time":"","memo":""}`;

  const taskEl = document.getElementById(jobId);

  try {
    const url = `${GEMINI_API}/${GEMINI_MODEL}:generateContent?key=${apiKey}`;
    const res = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        contents: [{ parts: [
          { inline_data: { mime_type: 'image/jpeg', data: b64Data } },
          { text: prompt }
        ]}]
      })
    });

    if (!res.ok) throw new Error('AIサーバー混雑、または通信エラー');

    const json = await res.json();
    const raw = json.candidates?.[0]?.content?.parts?.[0]?.text || '';
    const clean = raw.replace(/```[a-z]*\n?|```/g, '').trim();
    const data = JSON.parse(clean);

    // GASスプレッドシートへ送信
    data._sentAt = new Date().toLocaleString('ja-JP');
    await fetch(GAS_URL, {
      method: 'POST', mode: 'no-cors',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify(data),
    });

    // 完了したら緑色に変える
    taskEl.className = 'task-item success';
    taskEl.innerHTML = `<span>✅ ${num}枚目のシート: スプレッドシートへ自動送信が完了しました！</span>`;
    
    // 5秒後に通知を消す
    setTimeout(() => { taskEl.remove(); }, 5000);

  } catch (err) {
    // 万が一エラーになった場合は赤くして残す
    taskEl.className = 'task-item error';
    taskEl.innerHTML = `<span>❌ ${num}枚目のシート: 混雑のため送信失敗。もう一度撮影してください。</span>`;
  }
}

// ── 設定画面 ──────────────────────────────────────
function openCfg() {
  const k = getKey();
  document.getElementById('s_key').value = k;
  document.getElementById('keyStatus').textContent = k ? '✅ 設定済み' : '❌ 未設定';
  document.getElementById('keyStatus').style.color = k ? '#166534' : '#b91c1c';
  document.getElementById('cfgOverlay').style.display = 'flex';
}
function closeCfg() { document.getElementById('cfgOverlay').style.display = 'none'; }
function saveCfg() {
  const k = document.getElementById('s_key').value.trim();
  if (!k) { alert('APIキーを入力してください'); return; }
  localStorage.setItem('xef_gemini', k);
  closeCfg();
}
</script>

<div id="cfgOverlay" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:flex-end;" onclick="if(event.target===this)closeCfg()">
  <div style="background:#fff;width:100%;border-radius:20px 20px 0 0;padding:24px 20px 48px;max-height:80vh;overflow-y:auto;">
    <div style="width:36px;height:4px;background:#ddd;border-radius:99px;margin:0 auto 18px;"></div>
    <div style="font-size:17px;font-weight:700;margin-bottom:12px;display:flex;justify-content:space-between;">
      設定 <button onclick="closeCfg()" style="background:none;border:none;font-size:24px;color:#aaa;cursor:pointer;">✕</button>
    </div>
    <div style="margin-bottom:6px;font-size:13px;font-weight:700;color:#444;">Gemini API Key</div>
    <input id="s_key" type="password" placeholder="AQ.Ab8... または AIza..."
      style="width:100%;padding:14px;border:2px solid #d1d5db;border-radius:10px;font-size:15px;margin-bottom:8px;-webkit-appearance:none;">
    <div id="keyStatus" style="font-size:12px;margin-bottom:20px;"></div>
  </div>
</div>

</body>
</html>
