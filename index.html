<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ヒアリング読取 | Cross Effect</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    :root {
      --accent: #e8441a;
      --dark: #111;
      --blue: #2563eb;
      --gray: #9ca3af;
      --bg: #f2f2f7;
      --card: #fff;
      --border: #d1d5db;
      --text: #111;
      --sub: #6b7280;
    }
    body {
      font-family: -apple-system, 'Hiragino Sans', 'Yu Gothic', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding-bottom: 80px;
    }
    .hdr {
      background: var(--dark);
      color: #fff;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,.3);
    }
    .hdr .brand {
      font-size: 10px;
      color: #888;
      letter-spacing: .1em;
    }
    .hdr h1 {
      font-size: 16px;
      font-weight: 700;
    }
    .main {
      padding: 16px;
      max-width: 500px;
      margin: 0 auto;
    }
    .card {
      background: var(--card);
      border-radius: 14px;
      padding: 18px;
      margin-bottom: 14px;
      box-shadow: 0 1px 4px rgba(0,0,0,.08);
    }
    .card-lbl {
      font-size: 11px;
      font-weight: 700;
      color: var(--sub);
      text-transform: uppercase;
      letter-spacing: .07em;
      margin-bottom: 14px;
    }
    .upload-zone {
      border: 2px dashed #ccc;
      border-radius: 10px;
      padding: 32px 20px;
      text-align: center;
      background: #fafafa;
      position: relative;
      cursor: pointer;
      transition: all .2s;
    }
    .upload-zone:active {
      border-color: var(--accent);
      background: #fff5f3;
    }
    .upload-zone input {
      position: absolute;
      inset: 0;
      opacity: 0;
      width: 100%;
      height: 100%;
      cursor: pointer;
    }
    .upload-icon {
      font-size: 44px;
      display: block;
      margin-bottom: 10px;
    }
    .upload-main {
      font-size: 16px;
      font-weight: 700;
      color: var(--dark);
      margin-bottom: 4px;
    }
    .upload-sub {
      font-size: 13px;
      color: var(--sub);
      line-height: 1.6;
    }
    .preview-wrap {
      display: none;
      position: relative;
    }
    .preview-wrap img {
      width: 100%;
      border-radius: 10px;
      display: block;
    }
    .preview-clear {
      position: absolute;
      top: 10px;
      right: 10px;
      background: rgba(0,0,0,.7);
      color: #fff;
      border: none;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .btn {
      display: block;
      width: 100%;
      padding: 17px;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      text-align: center;
      font-family: inherit;
      -webkit-appearance: none;
      letter-spacing: .02em;
    }
    .btn:active {
      filter: brightness(.9);
    }
    .btn:disabled {
      opacity: .4;
      pointer-events: none;
    }
    .btn-green {
      background: #16a34a;
      color: #fff;
      margin-bottom: 10px;
    }
    .btn-outline {
      background: #fff;
      color: var(--dark);
      border: 2px solid var(--border);
      font-size: 14px;
      padding: 13px;
    }
    .status {
      display: none;
      padding: 14px 16px;
      border-radius: 12px;
      font-size: 14px;
      margin-bottom: 14px;
      align-items: center;
      gap: 12px;
      line-height: 1.5;
    }
    .status.loading { display: flex; background: #eff6ff; color: #1d4ed8; }
    .status.success { display: flex; background: #f0fdf4; color: #166534; }
    .status.error { display: flex; background: #fff5f5; color: #b91c1c; }
    .spinner {
      width: 22px;
      height: 22px;
      flex-shrink: 0;
      border: 3px solid currentColor;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* フォーム */
    .sec-title {
      font-size: 11px;
      font-weight: 700;
      color: var(--sub);
      text-transform: uppercase;
      letter-spacing: .07em;
      padding-bottom: 10px;
      border-bottom: 1px solid #f0f0f0;
      margin-bottom: 16px;
    }
    .field {
      margin-bottom: 16px;
    }
    .field label {
      display: block;
      font-size: 13px;
      font-weight: 700;
      color: #444;
      margin-bottom: 7px;
    }
    .field input[type="text"] {
      display: block;
      width: 100%;
      height: 52px;
      padding: 0 14px;
      border: 2px solid #d1d5db;
      border-radius: 10px;
      font-size: 16px;
      color: #111;
      background: #fff;
    }
    .field input[type="text"]:focus, .field textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(232,68,26,.2);
    }
    .field textarea {
      display: block;
      width: 100%;
      min-height: 100px;
      padding: 14px;
      border: 2px solid #d1d5db;
      border-radius: 10px;
      font-size: 16px;
      line-height: 1.6;
      color: #111;
      background: #fff;
      resize: vertical;
    }

    /* 選択肢ボタンスタイル */
    .select-group {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 8px;
    }
    .select-item {
      position: relative;
    }
    .select-item input {
      position: absolute;
      opacity: 0;
      width: 0;
      height: 0;
    }
    .select-label {
      display: block;
      padding: 10px 16px;
      background: #f3f4f6;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      user-select: none;
      transition: all 0.15s;
    }
    .select-item input:checked + .select-label {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }
  </style>
</head>
<body>

  <div class="hdr">
    <div>
      <div class="brand">CROSS EFFECT</div>
      <h1>ヒアリングシート入力</h1>
    </div>
  </div>

  <div class="main">
    <div class="card">
      <div class="card-lbl"> シートを確認しながら手動入力</div>
      <div class="upload-zone" id="uploadZone">
        <input type="file" accept="image/*" id="fileInput" onchange="onFile(this)">
        <span class="upload-icon"></span>
        <div class="upload-main">写真をセット（任意）</div>
        <div class="upload-sub">画像をセットすると、下にフォームがすぐ展開します。<br>タップ選択で素早く入力可能です。</div>
      </div>
      <div class="preview-wrap" id="previewWrap">
        <img id="previewImg" src="" alt="">
        <button class="preview-clear" onclick="doReset()">✕</button>
      </div>
    </div>

    <div class="status" id="status"><div class="spinner" id="spinner"></div><span id="statusMsg"></span></div>

    <div id="resultArea" style="display:none;">
      
      <div class="card">
        <div class="sec-title"> 名刺情報</div>
        <div class="field"><label>会社名</label><input id="f_company" type="text"></div>
        <div class="field"><label>部署</label><input id="f_department" type="text"></div>
        <div class="field"><label>氏名</label><input id="f_name" type="text"></div>
        <div class="field"><label>電話番号</label><input id="f_phone" type="text" inputmode="tel"></div>
        <div class="field"><label>メールアドレス</label><input id="f_email" type="text" inputmode="email"></div>
      </div>

      <div class="card">
        <div class="sec-title"> 基本情報</div>
        <div class="field"><label>展示会名</label><input id="f_exhibition" type="text"></div>
        <div class="field"><label>日付</label><input id="f_date" type="text"></div>
        <div class="field"><label>対応者</label><input id="f_staff" type="text"></div>
      </div>

      <div class="card">
        <div class="sec-title">Q1 開発・試作の案件</div>
        <div class="field">
          <label>チェック内容（複数選択可）</label>
          <div class="select-group">
            <label class="select-item"><input type="checkbox" name="q1" value="ある"> <span class="select-label">ある</span></label>
            <label class="select-item"><input type="checkbox" name="q1" value="近々あり"> <span class="select-label">近々あり</span></label>
            <label class="select-item"><input type="checkbox" name="q1" value="定期的"> <span class="select-label">定定期</span></label>
            <label class="select-item"><input type="checkbox" name="q1" value="今後ありうる"> <span class="select-label">今後</span></label>
            <label class="select-item"><input type="checkbox" name="q1" value="なし"> <span class="select-label">なし</span></label>
          </div>
        </div>
        <div class="field"><label>その他（手書き）</label><input id="f_q1_other" type="text"></div>
      </div>

      <div class="card">
        <div class="sec-title">Q2 スケジュール</div>
        <div class="field">
          <label>チェック内容（複数選択可）</label>
          <div class="select-group">
            <label class="select-item"><input type="checkbox" name="q2" value="大至急"> <span class="select-label">大至急</span></label>
            <label class="select-item"><input type="checkbox" name="q2" value="3ヶ月以内"> <span class="select-label">3ヶ月内</span></label>
            <label class="select-item"><input type="checkbox" name="q2" value="6ヶ月以内"> <span class="select-label">6ヶ月内</span></label>
            <label class="select-item"><input type="checkbox" name="q2" value="1年以内"> <span class="select-label">1年内</span></label>
            <label class="select-item"><input type="checkbox" name="q2" value="未定"> <span class="select-label">未定</span></label>
          </div>
        </div>
        <div class="field"><label>その他（手書き）</label><input id="f_q2_other" type="text"></div>
      </div>

      <div class="card">
        <div class="sec-title">Q3 ロット規模</div>
        <div class="field">
          <label>チェック内容（複数選択可）</label>
          <div class="select-group">
            <label class="select-item"><input type="checkbox" name="q3" value="試作のみ(1-数個)"> <span class="select-label">試作のみ</span></label>
            <label class="select-item"><input type="checkbox" name="q3" value="小ロット(数十-数百)"> <span class="select-label">小ロット</span></label>
            <label class="select-item"><input type="checkbox" name="q3" value="量産試作(数千-)"> <span class="select-label">量産試作</span></label>
          </div>
        </div>
        <div class="field"><label>その他（手書き）</label><input id="f_q3_other" type="text"></div>
      </div>

      <div class="card">
        <div class="sec-title">Q4 使用材質</div>
        <div class="field">
          <label>チェック内容（複数選択可）</label>
          <div class="select-group">
            <label class="select-item"><input type="checkbox" name="q4" value="汎用プラスチック"> <span class="select-label">汎用プラ</span></label>
            <label class="select-item"><input type="checkbox" name="q4" value="エンプラ"> <span class="select-label">エンプラ</span></label>
            <label class="select-item"><input type="checkbox" name="q4" value="スーパーエンプラ"> <span class="select-label">超エンプラ</span></label>
            <label class="select-item"><input type="checkbox" name="q4" value="透明樹脂"> <span class="select-label">透明樹脂</span></label>
            <label class="select-item"><input type="checkbox" name="q4" value="ゴム・エラストマー"> <span class="select-label">ゴム系</span></label>
            <label class="select-item"><input type="checkbox" name="q4" value="金属"> <span class="select-label">金属</span></label>
          </div>
        </div>
        <div class="field"><label>その他（手書き）</label><input id="f_q4_other" type="text"></div>
      </div>

      <div class="card">
        <div class="sec-title">Q5 現在の課題</div>
        <div class="field">
          <label>チェック内容（複数選択可）</label>
          <div class="select-group">
            <label class="select-item"><input type="checkbox" name="q5" value="納期短縮"> <span class="select-label">納期短縮</span></label>
            <label class="select-item"><input type="checkbox" name="q5" value="コスト削減"> <span class="select-label">コスト削減</span></label>
            <label class="select-item"><input type="checkbox" name="q5" value="品質・精度向上"> <span class="select-label">品質向上</span></label>
            <label class="select-item"><input type="checkbox" name="q5" value="形状・設計相談"> <span class="select-label">設計相談</span></label>
            <label class="select-item"><input type="checkbox" name="q5" value="課題なし"> <span class="select-label">課題なし</span></label>
          </div>
        </div>
        <div class="field"><label>その他（手書き）</label><input id="f_q5_other" type="text"></div>
      </div>

      <div class="card">
        <div class="sec-title">Q6 デザイン・設計</div>
        <div class="field">
          <label>チェック内容</label>
          <div class="select-group">
            <label class="select-item"><input type="checkbox" name="q6" value="社内で対応可能"> <span class="select-label">社内対応可</span></label>
            <label class="select-item"><input type="checkbox" name="q6" value="外注を検討中"> <span class="select-label">外注検討</span></label>
            <label class="select-item"><input type="checkbox" name="q6" value="相談したい"> <span class="select-label">相談したい</span></label>
          </div>
        </div>
        <div class="field"><label>その他（手書き）</label><input id="f_q6_other" type="text"></div>
      </div>

      <div class="card">
        <div class="sec-title">Q7 CG動画・VR</div>
        <div class="field">
          <label>チェック内容</label>
          <div class="select-group">
            <label class="select-item"><input type="checkbox" name="q7" value="興味あり"> <span class="select-label">興味あり</span></label>
            <label class="select-item"><input type="checkbox" name="q7" value="必要性を感じている"> <span class="select-label">必要性あり</span></label>
            <label class="select-item"><input type="checkbox" name="q7" value="予定なし"> <span class="select-label">予定なし</span></label>
          </div>
        </div>
        <div class="field"><label>その他（手書き）</label><input id="f_q7_other" type="text"></div>
      </div>

      <div class="card">
        <div class="sec-title">Q8 工場見学</div>
        <div class="field">
          <label>チェック内容</label>
          <div class="select-group">
            <label class="select-item"><input type="checkbox" name="q8" value="ぜひ見学したい"> <span class="select-label">ぜひ見学</span></label>
            <label class="select-item"><input type="checkbox" name="q8" value="機会があれば"> <span class="select-label">機会あれば</span></label>
            <label class="select-item"><input type="checkbox" name="q8" value="希望しない"> <span class="select-label">希望しない</span></label>
          </div>
        </div>
        <div class="field"><label>希望時期（手書き）</label><input id="f_q8_time" type="text"></div>
      </div>

      <div class="card">
        <div class="sec-title"> 備考・担当者メモ（手書き）</div>
        <div class="field"><textarea id="f_memo" placeholder="手書きメモの内容を入力してください"></textarea></div>
      </div>

      <button class="btn btn-green" id="submitBtn" onclick="submitData()"> スプレッドシートに送信</button>
      <button class="btn btn-outline" onclick="doReset()">← 最初からやり直す</button>
    </div>
  </div>

  <script>
    function onFile(input) {
      const file = input.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = e => {
        document.getElementById('previewImg').src = e.target.result;
        document.getElementById('uploadZone').style.display  = 'none';
        document.getElementById('previewWrap').style.display = 'block';
        document.getElementById('resultArea').style.display  = 'block';
        hideSt();
      };
      reader.readAsDataURL(file);
    }

    // 起動時、即入力できるように最初から表示させる場合はここを実行
    document.addEventListener("DOMContentLoaded", () => {
      document.getElementById('resultArea').style.display = 'block';
    });

    function doReset() {
      document.getElementById('fileInput').value = '';
      document.getElementById('uploadZone').style.display  = 'block';
      document.getElementById('previewWrap').style.display = 'none';
      
      // テキスト・エリアのリセット
      ['f_company','f_department','f_name','f_phone','f_email','f_exhibition','f_date','f_staff',
       'f_q1_other','f_q2_other','f_q3_other','f_q4_other','f_q5_other','f_q6_other','f_q7_other','f_q8_time','f_memo'
      ].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.value = '';
      });

      // チェックボックスの一括解除
      document.querySelectorAll('input[type="checkbox"]').forEach(cb => cb.checked = false);
      document.getElementById('submitBtn').disabled = false;
      hideSt();
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function showSt(type, msg) {
      const el = document.getElementById('status');
      el.className = 'status ' + type;
      document.getElementById('statusMsg').textContent = msg;
      document.getElementById('spinner').style.display = type === 'loading' ? 'block' : 'none';
    }
    function hideSt() { document.getElementById('status').className = 'status'; }

    // タップ選択された値をカンマ区切りで回収する関数
    function getSelectedValues(name) {
      const vals = [];
      document.querySelectorAll(`input[name="${name}"]:checked`).forEach(cb => vals.push(cb.value));
      return vals.join(', ');
    }

    function collect() {
      return {
        card_company:    document.getElementById('f_company').value.trim(),
        card_department: document.getElementById('f_department').value.trim(),
        card_name:       document.getElementById('f_name').value.trim(),
        card_phone:      document.getElementById('f_phone').value.trim(),
        card_email:      document.getElementById('f_email').value.trim(),
        exhibition:      document.getElementById('f_exhibition').value.trim(),
        date:            document.getElementById('f_date').value.trim(),
        staff:           document.getElementById('f_staff').value.trim(),
        q1:              getSelectedValues('q1'),
        q1_other:        document.getElementById('f_q1_other').value.trim(),
        q2:              getSelectedValues('q2'),
        q2_other:        document.getElementById('f_q2_other').value.trim(),
        q3:              getSelectedValues('q3'),
        q3_other:        document.getElementById('f_q3_other').value.trim(),
        q4:              getSelectedValues('q4'),
        q4_other:        document.getElementById('f_q4_other').value.trim(),
        q5:              getSelectedValues('q5'),
        q5_other:        document.getElementById('f_q5_other').value.trim(),
        q6:              getSelectedValues('q6'),
        q6_other:        document.getElementById('f_q6_other').value.trim(),
        q7:              getSelectedValues('q7'),
        q7_other:        document.getElementById('f_q7_other').value.trim(),
        q8:              getSelectedValues('q8'),
        q8_visit_time:   document.getElementById('f_q8_time').value.trim(),
        memo:            document.getElementById('f_memo').value.trim()
      };
    }

    // 簡易的なランク自動判定（選択されたボタンを元に計算）
    function calcRank(payload) {
      const hasPrj = /ある|近々|定定期/.test(payload.q1);
      const urgent = /大至急|3ヶ月/.test(payload.q2);
      const mid    = /6ヶ月|1年|未定/.test(payload.q2);
      const issue  = payload.q5.length > 0 && !payload.q5.includes('課題なし');
      const visit  = /ぜひ見学/.test(payload.q8);
      if (hasPrj && urgent) return 'A';
      if ((hasPrj && mid) || issue || visit) return 'B';
      return 'C';
    }

    async function submitData() {
      const btn = document.getElementById('submitBtn');
      btn.disabled = true;
      showSt('loading', 'スプレッドシートに送信中...');
      
      const payload   = collect();
      payload._rank   = calcRank(payload);
      payload._sentAt = new Date().toLocaleString('ja-JP');
      
      try {
        await fetch(GAS_URL, {
          method: 'POST', mode: 'no-cors',
          headers: { 'Content-Type': 'text/plain' },
          body: JSON.stringify(payload),
        });
        showSt('success', ' 送信完了！スプレッドシートを確認してください');
        setTimeout(doReset, 3000);
      } catch (err) {
        showSt('error', '送信エラー: ' + err.message + ' (もう一度送信ボタンを押せます)');
        btn.disabled = false; 
      }
    }
  </script>
</body>
</html>
