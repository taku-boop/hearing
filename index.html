<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ヒアリング読取 | Cross Effect</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --accent: #e8441a;
  --dark:   #111111;
  --blue:   #2563eb;
  --gray:   #9ca3af;
  --bg:     #f2f2f7;
  --card:   #ffffff;
  --border: #d1d5db;
  --text:   #111111;
  --sub:    #6b7280;
}

body {
  font-family: -apple-system, 'Hiragino Sans', 'Yu Gothic', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding-bottom: 60px;
  font-size: 16px;
}

/* ── ヘッダー ── */
.app-header {
  background: var(--dark); color: #fff;
  padding: 14px 16px;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 100;
  box-shadow: 0 2px 8px rgba(0,0,0,.3);
}
.app-header .brand { font-size: 10px; color: #888; letter-spacing: .1em; }
.app-header h1    { font-size: 16px; font-weight: 700; }
.cfg-btn {
  background: none; border: 1px solid #555; color: #ccc;
  padding: 6px 12px; border-radius: 6px; font-size: 13px; cursor: pointer;
}

/* ── メイン ── */
.main { padding: 16px; max-width: 500px; margin: 0 auto; }

/* ── カード ── */
.card {
  background: var(--card); border-radius: 14px;
  padding: 18px; margin-bottom: 14px;
  box-shadow: 0 1px 4px rgba(0,0,0,.08);
}
.card-label {
  font-size: 11px; font-weight: 700; color: var(--sub);
  text-transform: uppercase; letter-spacing: .07em; margin-bottom: 14px;
}

/* ── アップロード ── */
.upload-zone {
  border: 2px dashed #d1d5db; border-radius: 10px;
  padding: 36px 20px; text-align: center;
  background: #fafafa; position: relative; cursor: pointer;
  transition: border-color .2s;
}
.upload-zone:active { border-color: var(--accent); background: #fff5f3; }
.upload-zone input {
  position: absolute; inset: 0; opacity: 0; width: 100%; height: 100%; cursor: pointer;
}
.upload-icon { font-size: 42px; display: block; margin-bottom: 10px; }
.upload-main { font-size: 16px; font-weight: 700; color: var(--dark); margin-bottom: 4px; }
.upload-sub  { font-size: 13px; color: var(--sub); }

/* ── プレビュー ── */
.preview-wrap { display: none; position: relative; }
.preview-wrap img { width: 100%; border-radius: 10px; display: block; }
.preview-clear {
  position: absolute; top: 10px; right: 10px;
  background: rgba(0,0,0,.65); color: #fff; border: none;
  width: 32px; height: 32px; border-radius: 50%; font-size: 16px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
}

/* ── ボタン ── */
.btn {
  display: block; width: 100%; padding: 16px;
  border: none; border-radius: 12px;
  font-size: 16px; font-weight: 700; cursor: pointer;
  text-align: center; font-family: inherit;
  transition: opacity .15s, transform .1s;
  -webkit-appearance: none;
}
.btn:active  { transform: scale(.97); }
.btn:disabled { opacity: .35; pointer-events: none; }
.btn-accent  { background: var(--accent); color: #fff; }
.btn-dark    { background: var(--dark);   color: #fff; }
.btn-outline {
  background: #fff; color: var(--dark);
  border: 1.5px solid var(--border); margin-top: 10px;
  font-size: 14px; padding: 12px;
}

/* ── ステータス ── */
.status {
  display: none; padding: 14px 16px; border-radius: 12px;
  font-size: 14px; margin-bottom: 14px;
  align-items: center; gap: 12px;
}
.status.loading { display: flex; background: #eff6ff; color: #1d4ed8; }
.status.success { display: flex; background: #f0fdf4; color: #166534; }
.status.error   { display: flex; background: #fff5f5; color: #b91c1c; }
.spinner {
  width: 20px; height: 20px; flex-shrink: 0;
  border: 3px solid currentColor; border-top-color: transparent;
  border-radius: 50%; animation: spin .7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── ランク ── */
.rank-box {
  display: flex; align-items: center; gap: 14px;
  padding: 16px; border-radius: 12px; margin-bottom: 14px;
}
.rank-box.ra { background: #fff5f3; border: 2px solid var(--accent); }
.rank-box.rb { background: #eff6ff; border: 2px solid var(--blue); }
.rank-box.rc { background: #f9fafb; border: 2px solid var(--gray); }
.rank-circle {
  width: 48px; height: 48px; border-radius: 50%; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; font-weight: 900; color: #fff;
}
.ra .rank-circle { background: var(--accent); }
.rb .rank-circle { background: var(--blue); }
.rc .rank-circle { background: var(--gray); }
.rank-info strong { display: block; font-size: 16px; font-weight: 700; margin-bottom: 2px; }
.rank-info span   { font-size: 12px; color: var(--sub); line-height: 1.4; }

/* ── 結果フォーム ── */
.result-wrap { display: none; }
.sec-title {
  font-size: 11px; font-weight: 700; color: var(--sub);
  text-transform: uppercase; letter-spacing: .07em;
  padding-bottom: 10px; border-bottom: 1px solid #f0f0f0; margin-bottom: 14px;
}
.field { margin-bottom: 14px; }
.field:last-child { margin-bottom: 0; }
.field label {
  display: block; font-size: 12px; font-weight: 600;
  color: var(--sub); margin-bottom: 6px;
}

/* ── 入力欄（編集しやすくする） ── */
.field input,
.field textarea {
  width: 100%;
  padding: 12px 14px;
  border: 2px solid var(--border);
  border-radius: 10px;
  font-size: 15px;
  color: var(--text);
  background: #ffffff;          /* 白背景で編集できると明確に */
  font-family: inherit;
  -webkit-appearance: none;
  appearance: none;
  cursor: text;
  transition: border-color .2s, box-shadow .2s;
  /* タップ可能を明確にする */
  touch-action: manipulation;
}
.field input:focus,
.field textarea:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(232,68,26,.15);
}
.field textarea {
  resize: vertical; min-height: 80px; line-height: 1.5;
}

/* 編集ヒント */
.edit-hint {
  background: #fffbeb; border: 1px solid #fde68a;
  border-radius: 10px; padding: 12px 14px;
  font-size: 13px; color: #92400e;
  margin-bottom: 14px; display: flex; align-items: center; gap: 8px;
}

/* ── 設定モーダル ── */
.overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,.5); z-index: 200; align-items: flex-end;
}
.overlay.open { display: flex; }
.bottom-sheet {
  background: #fff; width: 100%; border-radius: 20px 20px 0 0;
  padding: 20px 20px 40px; max-height: 80vh; overflow-y: auto;
}
.bs-handle { width: 36px; height: 4px; background: #ddd; border-radius: 99px; margin: 0 auto 18px; }
.bs-title { font-size: 17px; font-weight: 700; margin-bottom: 18px; display: flex; justify-content: space-between; align-items: center; }
.bs-close { background: none; border: none; font-size: 22px; color: #aaa; cursor: pointer; }

/* ── APIキー状態表示 ── */
.key-status {
  font-size: 12px; padding: 6px 10px; border-radius: 6px; margin-top: 6px; display: inline-block;
}
.key-ok  { background: #f0fdf4; color: #166534; }
.key-ng  { background: #fff5f5; color: #b91c1c; }
</style>
</head>
<body>

<div class="app-header">
  <div>
    <div class="brand">CROSS EFFECT</div>
    <h1>ヒアリングシート読取</h1>
  </div>
  <button class="cfg-btn" onclick="openCfg()">⚙ 設定</button>
</div>

<div class="main">

  <!-- アップロード -->
  <div class="card">
    <div class="card-label">📷 シートを撮影・アップロード</div>
    <div class="upload-zone" id="uploadZone">
      <input type="file" accept="image/*" capture="environment" id="fileInput" onchange="onFile(this)">
      <span class="upload-icon">📄</span>
      <div class="upload-main">タップして撮影 / 選択</div>
      <div class="upload-sub">名刺が貼付されたシートを1枚で</div>
    </div>
    <div class="preview-wrap" id="previewWrap">
      <img id="previewImg" src="" alt="">
      <button class="preview-clear" onclick="reset()">✕</button>
    </div>
  </div>

  <button class="btn btn-accent" id="analyzeBtn" onclick="analyze()" disabled>🔍 AIで読み取る</button>
  <div style="height:12px;"></div>

  <!-- ステータス -->
  <div class="status" id="status">
    <div class="spinner" id="spinner"></div>
    <span id="statusMsg"></span>
  </div>

  <!-- 結果 -->
  <div class="result-wrap" id="resultWrap">

    <div id="rankDisplay"></div>

    <div class="edit-hint">✏️ 各項目をタップして内容を修正できます</div>

    <!-- 名刺情報 -->
    <div class="card">
      <div class="sec-title">名刺情報（自動読取）</div>
      <div class="field"><label>会社名</label><input id="f_company" type="text" placeholder="例：株式会社〇〇"></div>
      <div class="field"><label>部署</label><input id="f_department" type="text" placeholder="例：開発部"></div>
      <div class="field"><label>氏名</label><input id="f_name" type="text" placeholder="例：山田 太郎"></div>
      <div class="field"><label>電話番号</label><input id="f_phone" type="tel" placeholder="例：06-1234-5678"></div>
      <div class="field"><label>メールアドレス</label><input id="f_email" type="email" placeholder="例：taro@example.com"></div>
    </div>

    <!-- 基本情報 -->
    <div class="card">
      <div class="sec-title">シート基本情報</div>
      <div class="field"><label>展示会名</label><input id="f_exhibition" type="text"></div>
      <div class="field"><label>日付</label><input id="f_date" type="text"></div>
      <div class="field"><label>対応者</label><input id="f_staff" type="text"></div>
    </div>

    <!-- Q1〜Q8 -->
    <div class="card">
      <div class="sec-title">Q1 開発・試作の案件</div>
      <div class="field"><label>回答</label><input id="f_q1" type="text"></div>
      <div class="field"><label>その他</label><input id="f_q1_other" type="text"></div>
    </div>
    <div class="card">
      <div class="sec-title">Q2 スケジュール</div>
      <div class="field"><label>回答</label><input id="f_q2" type="text"></div>
      <div class="field"><label>その他</label><input id="f_q2_other" type="text"></div>
    </div>
    <div class="card">
      <div class="sec-title">Q3 ロット規模</div>
      <div class="field"><label>回答</label><input id="f_q3" type="text"></div>
      <div class="field"><label>その他</label><input id="f_q3_other" type="text"></div>
    </div>
    <div class="card">
      <div class="sec-title">Q4 使用材質</div>
      <div class="field"><label>回答</label><input id="f_q4" type="text"></div>
      <div class="field"><label>その他</label><input id="f_q4_other" type="text"></div>
    </div>
    <div class="card">
      <div class="sec-title">Q5 現在の課題</div>
      <div class="field"><label>回答</label><input id="f_q5" type="text"></div>
      <div class="field"><label>その他</label><input id="f_q5_other" type="text"></div>
    </div>
    <div class="card">
      <div class="sec-title">Q6 デザイン・設計</div>
      <div class="field"><label>回答</label><input id="f_q6" type="text"></div>
      <div class="field"><label>その他</label><input id="f_q6_other" type="text"></div>
    </div>
    <div class="card">
      <div class="sec-title">Q7 CG動画・VR</div>
      <div class="field"><label>回答</label><input id="f_q7" type="text"></div>
      <div class="field"><label>その他</label><input id="f_q7_other" type="text"></div>
    </div>
    <div class="card">
      <div class="sec-title">Q8 工場見学</div>
      <div class="field"><label>回答</label><input id="f_q8" type="text"></div>
      <div class="field"><label>希望時期</label><input id="f_q8_time" type="text"></div>
    </div>
    <div class="card">
      <div class="sec-title">備考・担当者メモ</div>
      <div class="field"><textarea id="f_memo" placeholder="自由記述"></textarea></div>
    </div>

    <button class="btn btn-dark" id="submitBtn" onclick="submit()">📊 スプレッドシートに送信</button>
    <button class="btn btn-outline" onclick="reset()">← 最初からやり直す</button>

  </div>

</div>

<!-- 設定モーダル -->
<div class="overlay" id="cfgOverlay" onclick="bgClose(event)">
  <div class="bottom-sheet">
    <div class="bs-handle"></div>
    <div class="bs-title">設定 <button class="bs-close" onclick="closeCfg()">✕</button></div>

    <div class="field">
      <label>Anthropic API Key</label>
      <input id="s_key" type="password" placeholder="sk-ant-api03-...">
      <span class="key-status" id="keyStatus"></span>
    </div>
    <div style="height:12px;"></div>
    <div class="field">
      <label>GAS Web App URL（変更不要）</label>
      <input id="s_gas" type="url" placeholder="https://script.google.com/...">
    </div>
    <div style="height:20px;"></div>
    <button class="btn btn-accent" onclick="saveCfg()">保存する</button>
  </div>
</div>

<script>
// ════════════════════════════════════════════════════
//  設定値（GAS URLはここに固定）
// ════════════════════════════════════════════════════
const GAS_URL_DEFAULT = 'https://script.google.com/macros/s/AKfycbxhH9mh8x6c_8Ql33QAZ83F2yb4cZRmcnLsGj5HaFJ6PjsAgbQMRyAomcToH0RqGO30/exec';

// ════════════════════════════════════════════════════
//  状態
// ════════════════════════════════════════════════════
let imgB64  = null;
let imgMime = 'image/jpeg';

// ════════════════════════════════════════════════════
//  設定
// ════════════════════════════════════════════════════
function openCfg() {
  const k = localStorage.getItem('xef_key') || '';
  document.getElementById('s_key').value = k;
  document.getElementById('s_gas').value = localStorage.getItem('xef_gas') || GAS_URL_DEFAULT;
  document.getElementById('keyStatus').textContent = k ? '✅ APIキー設定済み' : '❌ 未設定';
  document.getElementById('keyStatus').className   = 'key-status ' + (k ? 'key-ok' : 'key-ng');
  document.getElementById('cfgOverlay').classList.add('open');
}
function closeCfg() { document.getElementById('cfgOverlay').classList.remove('open'); }
function bgClose(e) { if (e.target === document.getElementById('cfgOverlay')) closeCfg(); }
function saveCfg() {
  const k = document.getElementById('s_key').value.trim();
  const g = document.getElementById('s_gas').value.trim() || GAS_URL_DEFAULT;
  localStorage.setItem('xef_key', k);
  localStorage.setItem('xef_gas', g);
  closeCfg();
  showStatus('success', '設定を保存しました');
  setTimeout(hideStatus, 2000);
}

// ════════════════════════════════════════════════════
//  ファイル選択
// ════════════════════════════════════════════════════
function onFile(input) {
  const file = input.files[0];
  if (!file) return;
  imgMime = file.type || 'image/jpeg';
  const r = new FileReader();
  r.onload = e => {
    imgB64 = e.target.result.split(',')[1];
    document.getElementById('previewImg').src = e.target.result;
    document.getElementById('uploadZone').style.display  = 'none';
    document.getElementById('previewWrap').style.display = 'block';
    document.getElementById('analyzeBtn').disabled = false;
    document.getElementById('resultWrap').style.display = 'none';
    hideStatus();
  };
  r.readAsDataURL(file);
}

function reset() {
  imgB64 = null;
  document.getElementById('fileInput').value = '';
  document.getElementById('uploadZone').style.display  = 'block';
  document.getElementById('previewWrap').style.display = 'none';
  document.getElementById('analyzeBtn').disabled = true;
  document.getElementById('resultWrap').style.display = 'none';
  hideStatus();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ════════════════════════════════════════════════════
//  ステータス
// ════════════════════════════════════════════════════
function showStatus(type, msg) {
  const el = document.getElementById('status');
  el.className = 'status ' + type;
  document.getElementById('statusMsg').textContent = msg;
  document.getElementById('spinner').style.display = type === 'loading' ? 'block' : 'none';
}
function hideStatus() { document.getElementById('status').className = 'status'; }

// ════════════════════════════════════════════════════
//  ランク
// ════════════════════════════════════════════════════
function calcRank(d) {
  const q1 = d.q1 || '', q2 = d.q2 || '', q5 = d.q5 || '', q8 = d.q8 || '';
  const hasPrj   = /ある|定期的|今後/.test(q1);
  const urgent   = /大至急|3ヶ月/.test(q2);
  const midterm  = /6ヶ月|1年|未定/.test(q2);
  const hasIssue = q5.length > 0 && !q5.includes('課題なし');
  const visit    = /ぜひ|見学したい/.test(q8);
  if (hasPrj && urgent)                        return 'A';
  if ((hasPrj && midterm) || hasIssue || visit) return 'B';
  return 'C';
}

const RANK_INFO = {
  A: { cls: 'ra', label: 'Aランク　今すぐ対応', desc: '直近案件あり・大手開発者で案件見込み' },
  B: { cls: 'rb', label: 'Bランク　継続フォロー', desc: '中長期案件・相談・見学ニーズあり' },
  C: { cls: 'rc', label: 'Cランク　情報提供のみ', desc: '案件なし・他業種・営業来訪' },
};
function renderRank(r) {
  const i = RANK_INFO[r];
  document.getElementById('rankDisplay').innerHTML = `
    <div class="rank-box ${i.cls}">
      <div class="rank-circle">${r}</div>
      <div class="rank-info"><strong>${i.label}</strong><span>${i.desc}</span></div>
    </div>`;
}

// ════════════════════════════════════════════════════
//  AI 読み取り
// ════════════════════════════════════════════════════
async function analyze() {
  const key = localStorage.getItem('xef_key');
  if (!key) { openCfg(); return; }
  if (!imgB64) return;

  document.getElementById('analyzeBtn').disabled = true;
  document.getElementById('resultWrap').style.display = 'none';
  showStatus('loading', 'AIがシートを読み取り中...（10〜20秒かかります）');

  const prompt = `これはクロスエフェクト株式会社の展示会ヒアリングシートの写真です。
右上に名刺が貼付されている場合があります。
チェックボックス（☑ ✓ ○ 手書きチェックなど）が入っている項目を読み取ってください。
複数チェックはカンマ区切り。読み取れない項目は空文字にしてください。
以下のJSONのみを返してください（コードブロック・説明文は不要）:
{"card_company":"","card_department":"","card_name":"","card_phone":"","card_email":"","date":"","staff":"","exhibition":"","q1":"","q1_other":"","q2":"","q2_other":"","q3":"","q3_other":"","q4":"","q4_other":"","q5":"","q5_other":"","q6":"","q6_other":"","q7":"","q7_other":"","q8":"","q8_visit_time":"","memo":""}`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': key,
        'anthropic-version': '2023-06-01',
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-6',
        max_tokens: 1500,
        messages: [{
          role: 'user',
          content: [
            { type: 'image', source: { type: 'base64', media_type: imgMime, data: imgB64 } },
            { type: 'text', text: prompt }
          ]
        }]
      })
    });

    if (!res.ok) {
      const e = await res.json().catch(() => ({}));
      throw new Error(e.error?.message || `APIエラー (${res.status})`);
    }

    const json = await res.json();
    const raw  = json.content?.find(b => b.type === 'text')?.text || '';
    const data = JSON.parse(raw.replace(/```[a-z]*\n?|```/g, '').trim());

    fill(data);
    const rank = calcRank(data);
    renderRank(rank);

    document.getElementById('resultWrap').style.display = 'block';
    showStatus('success', '✅ 読み取り完了！内容を確認・修正してから送信してください');
    document.getElementById('rankDisplay').scrollIntoView({ behavior: 'smooth', block: 'start' });

  } catch(err) {
    showStatus('error', '読み取りエラー: ' + err.message);
    console.error(err);
  } finally {
    document.getElementById('analyzeBtn').disabled = false;
  }
}

// ════════════════════════════════════════════════════
//  フィールド入出力
// ════════════════════════════════════════════════════
const FMAP = [
  ['f_company','card_company'], ['f_department','card_department'],
  ['f_name','card_name'], ['f_phone','card_phone'], ['f_email','card_email'],
  ['f_exhibition','exhibition'], ['f_date','date'], ['f_staff','staff'],
  ['f_q1','q1'], ['f_q1_other','q1_other'],
  ['f_q2','q2'], ['f_q2_other','q2_other'],
  ['f_q3','q3'], ['f_q3_other','q3_other'],
  ['f_q4','q4'], ['f_q4_other','q4_other'],
  ['f_q5','q5'], ['f_q5_other','q5_other'],
  ['f_q6','q6'], ['f_q6_other','q6_other'],
  ['f_q7','q7'], ['f_q7_other','q7_other'],
  ['f_q8','q8'], ['f_q8_time','q8_visit_time'],
  ['f_memo','memo'],
];

function fill(d) {
  FMAP.forEach(([id, key]) => {
    const el = document.getElementById(id);
    if (el) el.value = d[key] || '';
  });
}

function collect() {
  const d = {};
  FMAP.forEach(([id, key]) => {
    const el = document.getElementById(id);
    d[key] = el ? el.value.trim() : '';
  });
  return d;
}

// ════════════════════════════════════════════════════
//  スプレッドシート送信
// ════════════════════════════════════════════════════
async function submit() {
  const gasUrl = localStorage.getItem('xef_gas') || GAS_URL_DEFAULT;

  document.getElementById('submitBtn').disabled = true;
  showStatus('loading', 'スプレッドシートに送信中...');

  const payload     = collect();
  payload._rank     = calcRank(payload);
  payload._sentAt   = new Date().toISOString();

  try {
    // no-cors で送信（GAS側でCORSヘッダーが返せないため）
    await fetch(gasUrl, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify(payload),
    });

    // no-cors はレスポンスが読めないので成功とみなす
    showStatus('success', '✅ 送信完了！スプレッドシートを確認してください');
    setTimeout(() => {
      reset();
    }, 3000);

  } catch(err) {
    showStatus('error', '送信エラー: ' + err.message);
  } finally {
    document.getElementById('submitBtn').disabled = false;
  }
}
</script>
